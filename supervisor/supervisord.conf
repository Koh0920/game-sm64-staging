[unix_http_server]
file=/run/sm64/supervisor.sock
chmod=0700

[supervisord]
logfile=/dev/null
logfile_maxbytes=0
pidfile=/run/sm64/supervisord.pid
nodaemon=true
minfds=1024
user=ato

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[supervisorctl]
serverurl=unix:///run/sm64/supervisor.sock

[program:xvnc]
priority=10
command=/opt/sm64/scripts/start-vnc.sh
autorestart=true
startsecs=2
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0

[program:sm64]
priority=20
command=/opt/sm64/scripts/start-sm64.sh
autorestart=true
startsecs=3
environment=DISPLAY=":1",HOME="/home/ato",XDG_RUNTIME_DIR="/run/sm64/xdg"
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0

[program:websockify]
priority=30
command=/opt/sm64/scripts/start-websockify.sh
autorestart=true
startsecs=2
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0

[program:nginx]
priority=40
command=/opt/sm64/scripts/start-nginx.sh
autorestart=true
startsecs=2
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0
