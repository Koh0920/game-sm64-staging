pid /run/sm64/nginx.pid;
error_log /dev/stderr info;

events {
    worker_connections 256;
}

http {
    include /etc/nginx/mime.types;
    access_log /dev/stdout;
    client_body_temp_path /run/sm64/client_temp;
    proxy_temp_path /run/sm64/proxy_temp;
    fastcgi_temp_path /run/sm64/fastcgi_temp;
    uwsgi_temp_path /run/sm64/uwsgi_temp;
    scgi_temp_path /run/sm64/scgi_temp;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    server {
        listen 3000;
        server_name _;

        root /opt/sm64/web;
        index index.html;

        location = / {
            try_files /index.html =404;
        }

        location /novnc/ {
            alias /usr/share/novnc/;
        }

        location /websockify {
            proxy_pass http://127.0.0.1:6080;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header Origin $http_origin;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_buffering off;
        }

        location /healthz {
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        location /licenses/ {
            alias /opt/sm64/web/licenses/;
        }
    }
}
